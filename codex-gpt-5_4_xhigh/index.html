<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Thermal Receipt Physics</title>
  <style>
    :root {
      color-scheme: light;
      --bg-1: #ffffff;
      --bg-2: #f5f3ee;
      --text: #302c28;
      --muted: rgba(48, 44, 40, 0.64);
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(48, 44, 40, 0.08);
      --shadow: 0 18px 42px rgba(48, 44, 40, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.96) 24%, rgba(245, 243, 238, 0.9) 100%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0) 42%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .hud {
      position: fixed;
      top: 20px;
      left: 20px;
      display: grid;
      gap: 8px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      pointer-events: none;
      user-select: none;
      max-width: min(340px, calc(100vw - 40px));
    }

    .hud-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hud-copy {
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }

    .hud-copy strong {
      color: var(--text);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="hud-title">Receipt Physics</div>
    <div class="hud-copy">左键抓住小票任意非顶部区域，可拖拽、弯曲、折叠。顶部整条边缘始终被约束为<strong>笔直水平</strong>。</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 40);
    camera.position.set(0.18, 0.15, 7.3);
    camera.lookAt(0, -0.2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0xf7f5f0, 1);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.02;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.HemisphereLight(0xffffff, 0xece7dc, 1.28);
    scene.add(ambient);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.65);
    fillLight.position.set(-3.5, 2.6, 3.4);
    scene.add(fillLight);

    const keyLight = new THREE.DirectionalLight(0xfff8ef, 1.45);
    keyLight.position.set(2.6, 5.4, 4.8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.left = -4;
    keyLight.shadow.camera.right = 4;
    keyLight.shadow.camera.top = 5;
    keyLight.shadow.camera.bottom = -5;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 16;
    keyLight.shadow.bias = -0.00015;
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.35);
    rimLight.position.set(-2.2, -1.4, 4.2);
    scene.add(rimLight);

    const backdrop = new THREE.Mesh(
      new THREE.PlaneGeometry(18, 18),
      new THREE.MeshStandardMaterial({
        color: 0xf9f7f2,
        roughness: 0.96,
        metalness: 0.0
      })
    );
    backdrop.position.z = -0.48;
    backdrop.receiveShadow = true;
    scene.add(backdrop);

    const receiptWidth = 2.28;
    const receiptHeight = 5.5;
    const segmentsX = 18;
    const segmentsY = 56;
    const particleCols = segmentsX + 1;
    const particleRows = segmentsY + 1;
    const particleCount = particleCols * particleRows;
    const horizontalStep = receiptWidth / segmentsX;
    const verticalStep = receiptHeight / segmentsY;
    const solverIterations = 7;
    const substeps = 2;
    const gravity = new THREE.Vector3(0, -16.4, 0);
    const damping = 0.992;
    const backdropLimitZ = -0.32;

    const geometry = new THREE.PlaneGeometry(receiptWidth, receiptHeight, segmentsX, segmentsY);
    const positionAttr = geometry.getAttribute('position');
    positionAttr.setUsage(THREE.DynamicDrawUsage);
    const pos = positionAttr.array;
    const prev = new Float32Array(pos.length);
    const anchors = new Float32Array(pos.length);
    const pinned = new Uint8Array(particleCount);

    function particleIndex(col, row) {
      return row * particleCols + col;
    }

    function vecIndex(col, row) {
      return particleIndex(col, row) * 3;
    }

    function initParticles() {
      for (let row = 0; row < particleRows; row += 1) {
        const v = row / segmentsY;
        for (let col = 0; col < particleCols; col += 1) {
          const u = col / segmentsX;
          const index = vecIndex(col, row);
          const x = -receiptWidth * 0.5 + u * receiptWidth;
          const y = receiptHeight * 0.5 - v * receiptHeight;
          const lowerCurl = 0.12 * Math.pow(v, 1.65);
          const sideRipple = 0.012 * Math.sin(u * Math.PI * 2.0) * (0.15 + v * 0.85);
          const z = lowerCurl + sideRipple;

          pos[index] = x;
          pos[index + 1] = y;
          pos[index + 2] = z;

          prev[index] = x;
          prev[index + 1] = y;
          prev[index + 2] = z - (row > particleRows * 0.55 ? 0.012 : 0.0);

          anchors[index] = x;
          anchors[index + 1] = y;
          anchors[index + 2] = 0;

          if (row === 0) {
            pinned[particleIndex(col, row)] = 1;
            pos[index + 2] = 0;
            prev[index + 2] = 0;
          }
        }
      }
    }

    initParticles();

    const constraints = [];

    function addConstraint(colA, rowA, colB, rowB, stiffness) {
      const a = particleIndex(colA, rowA);
      const b = particleIndex(colB, rowB);
      const a3 = a * 3;
      const b3 = b * 3;
      const dx = pos[b3] - pos[a3];
      const dy = pos[b3 + 1] - pos[a3 + 1];
      const dz = pos[b3 + 2] - pos[a3 + 2];
      constraints.push({
        a,
        b,
        rest: Math.hypot(dx, dy, dz),
        stiffness
      });
    }

    function buildConstraints() {
      for (let row = 0; row < particleRows; row += 1) {
        for (let col = 0; col < particleCols; col += 1) {
          if (col < particleCols - 1) {
            addConstraint(col, row, col + 1, row, 1.0);
          }
          if (row < particleRows - 1) {
            addConstraint(col, row, col, row + 1, 1.0);
          }
          if (col < particleCols - 1 && row < particleRows - 1) {
            addConstraint(col, row, col + 1, row + 1, 0.82);
            addConstraint(col + 1, row, col, row + 1, 0.82);
          }
          if (col < particleCols - 2) {
            addConstraint(col, row, col + 2, row, 0.72);
          }
          if (row < particleRows - 2) {
            addConstraint(col, row, col, row + 2, 0.7);
          }
        }
      }
    }

    buildConstraints();

    const receiptTexture = buildReceiptTexture();
    const receiptMaterial = new THREE.MeshStandardMaterial({
      map: receiptTexture,
      color: 0xfffcf4,
      side: THREE.DoubleSide,
      roughness: 0.9,
      metalness: 0.0
    });

    const receipt = new THREE.Mesh(geometry, receiptMaterial);
    receipt.castShadow = true;
    receipt.receiveShadow = true;
    scene.add(receipt);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const dragPlane = new THREE.Plane();
    const planeHit = new THREE.Vector3();
    const pointerDirection = new THREE.Vector3();

    const dragState = {
      active: false,
      items: [],
      target: new THREE.Vector3(),
      previousTarget: new THREE.Vector3(),
      velocity: new THREE.Vector3()
    };

    const scratchTarget = new THREE.Vector3();

    function buildGrabCluster(col, row) {
      const centerIndex = particleIndex(col, row);
      const centerBase = centerIndex * 3;
      const centerX = pos[centerBase];
      const centerY = pos[centerBase + 1];
      const centerZ = pos[centerBase + 2];
      const radius = 2.15;
      const cluster = [];

      for (let r = Math.max(1, row - 2); r <= Math.min(particleRows - 1, row + 2); r += 1) {
        for (let c = Math.max(0, col - 2); c <= Math.min(particleCols - 1, col + 2); c += 1) {
          const dx = c - col;
          const dy = r - row;
          const dist = Math.hypot(dx, dy);
          if (dist > radius) {
            continue;
          }
          const index = particleIndex(c, r);
          if (pinned[index]) {
            continue;
          }
          const base = index * 3;
          const weight = THREE.MathUtils.lerp(1.0, 0.28, Math.min(dist / radius, 1.0));
          cluster.push({
            index,
            weight,
            offsetX: pos[base] - centerX,
            offsetY: pos[base + 1] - centerY,
            offsetZ: pos[base + 2] - centerZ
          });
        }
      }

      return cluster;
    }

    function syncTopEdge() {
      for (let col = 0; col < particleCols; col += 1) {
        const index = vecIndex(col, 0);
        pos[index] = anchors[index];
        pos[index + 1] = anchors[index + 1];
        pos[index + 2] = anchors[index + 2];
        prev[index] = anchors[index];
        prev[index + 1] = anchors[index + 1];
        prev[index + 2] = anchors[index + 2];
      }
    }

    function integrate(dtSquared) {
      for (let i = 0; i < particleCount; i += 1) {
        if (pinned[i]) {
          continue;
        }

        const base = i * 3;
        const currentX = pos[base];
        const currentY = pos[base + 1];
        const currentZ = pos[base + 2];

        const velocityX = (currentX - prev[base]) * damping;
        const velocityY = (currentY - prev[base + 1]) * damping;
        const velocityZ = (currentZ - prev[base + 2]) * 0.988;

        prev[base] = currentX;
        prev[base + 1] = currentY;
        prev[base + 2] = currentZ;

        pos[base] = currentX + velocityX;
        pos[base + 1] = currentY + velocityY + gravity.y * dtSquared;
        pos[base + 2] = currentZ + velocityZ;
      }
    }

    function solveConstraints() {
      for (let i = 0; i < constraints.length; i += 1) {
        const constraint = constraints[i];
        const a = constraint.a * 3;
        const b = constraint.b * 3;

        let dx = pos[b] - pos[a];
        let dy = pos[b + 1] - pos[a + 1];
        let dz = pos[b + 2] - pos[a + 2];
        const distance = Math.hypot(dx, dy, dz) || 1e-6;
        const difference = (distance - constraint.rest) / distance;
        const correction = difference * constraint.stiffness;

        const pinnedA = pinned[constraint.a];
        const pinnedB = pinned[constraint.b];

        if (!pinnedA && !pinnedB) {
          dx *= 0.5 * correction;
          dy *= 0.5 * correction;
          dz *= 0.5 * correction;
          pos[a] += dx;
          pos[a + 1] += dy;
          pos[a + 2] += dz;
          pos[b] -= dx;
          pos[b + 1] -= dy;
          pos[b + 2] -= dz;
        } else if (pinnedA && !pinnedB) {
          dx *= correction;
          dy *= correction;
          dz *= correction;
          pos[b] -= dx;
          pos[b + 1] -= dy;
          pos[b + 2] -= dz;
        } else if (!pinnedA && pinnedB) {
          dx *= correction;
          dy *= correction;
          dz *= correction;
          pos[a] += dx;
          pos[a + 1] += dy;
          pos[a + 2] += dz;
        }
      }
    }

    function constrainBackdrop() {
      for (let i = 0; i < particleCount; i += 1) {
        if (pinned[i]) {
          continue;
        }

        const base = i * 3;
        if (pos[base + 2] < backdropLimitZ) {
          const oldZ = pos[base + 2];
          pos[base + 2] = backdropLimitZ;
          prev[base + 2] = pos[base + 2] + (oldZ - backdropLimitZ) * 0.12;
        }
      }
    }

    function applyDragConstraint() {
      if (!dragState.active) {
        return;
      }

      for (let i = 0; i < dragState.items.length; i += 1) {
        const item = dragState.items[i];
        const base = item.index * 3;
        const follow = 0.92 * item.weight;

        scratchTarget.set(
          dragState.target.x + item.offsetX * 0.72,
          dragState.target.y + item.offsetY * 0.72,
          dragState.target.z + item.offsetZ * 0.72
        );

        pos[base] += (scratchTarget.x - pos[base]) * follow;
        pos[base + 1] += (scratchTarget.y - pos[base + 1]) * follow;
        pos[base + 2] += (scratchTarget.z - pos[base + 2]) * follow;

        prev[base] = pos[base] - dragState.velocity.x * item.weight * 0.95;
        prev[base + 1] = pos[base + 1] - dragState.velocity.y * item.weight * 0.95;
        prev[base + 2] = pos[base + 2] - dragState.velocity.z * item.weight * 0.95;
      }
    }

    function updatePointer(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function startDrag(event) {
      if (event.button !== 0) {
        return;
      }

      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      const hit = raycaster.intersectObject(receipt, false)[0];
      if (!hit) {
        return;
      }

      const local = hit.point;
      let col = Math.round((local.x + receiptWidth * 0.5) / horizontalStep);
      let row = Math.round((receiptHeight * 0.5 - local.y) / verticalStep);

      col = THREE.MathUtils.clamp(col, 0, particleCols - 1);
      row = THREE.MathUtils.clamp(row, 1, particleRows - 1);

      dragState.items = buildGrabCluster(col, row);
      if (!dragState.items.length) {
        return;
      }

      camera.getWorldDirection(pointerDirection);
      dragPlane.setFromNormalAndCoplanarPoint(pointerDirection, hit.point);

      dragState.active = true;
      dragState.target.copy(hit.point);
      dragState.previousTarget.copy(hit.point);
      dragState.velocity.set(0, 0, 0);

      renderer.domElement.classList.add('dragging');
      renderer.domElement.setPointerCapture(event.pointerId);
    }

    function moveDrag(event) {
      if (!dragState.active) {
        return;
      }

      updatePointer(event);
      raycaster.setFromCamera(pointer, camera);
      if (!raycaster.ray.intersectPlane(dragPlane, planeHit)) {
        return;
      }

      dragState.velocity.copy(planeHit).sub(dragState.previousTarget);
      dragState.previousTarget.copy(planeHit);
      dragState.target.copy(planeHit);
    }

    function endDrag(event) {
      if (!dragState.active) {
        return;
      }

      dragState.active = false;
      dragState.items = [];
      renderer.domElement.classList.remove('dragging');
      if (event) {
        renderer.domElement.releasePointerCapture(event.pointerId);
      }
    }

    renderer.domElement.addEventListener('pointerdown', startDrag);
    window.addEventListener('pointermove', moveDrag);
    window.addEventListener('pointerup', endDrag);
    window.addEventListener('pointercancel', endDrag);
    window.addEventListener('blur', () => endDrag());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let lastTime = performance.now();

    function stepSimulation(deltaSeconds) {
      const clampedDelta = Math.min(deltaSeconds, 1 / 24);
      const step = clampedDelta / substeps;
      const dtSquared = step * step;

      for (let substep = 0; substep < substeps; substep += 1) {
        integrate(dtSquared);
        applyDragConstraint();
        syncTopEdge();

        for (let iteration = 0; iteration < solverIterations; iteration += 1) {
          solveConstraints();
          applyDragConstraint();
          constrainBackdrop();
          syncTopEdge();
        }
      }
    }

    function render(now) {
      const deltaSeconds = (now - lastTime) / 1000;
      lastTime = now;

      stepSimulation(deltaSeconds);
      positionAttr.needsUpdate = true;
      geometry.computeVertexNormals();
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);

    function buildReceiptTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 1536;
      canvas.height = 3072;
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      const paperGradient = ctx.createLinearGradient(0, 0, 0, height);
      paperGradient.addColorStop(0, '#fffefb');
      paperGradient.addColorStop(0.38, '#fbf7ee');
      paperGradient.addColorStop(1, '#f2ebdf');
      ctx.fillStyle = paperGradient;
      ctx.fillRect(0, 0, width, height);

      ctx.globalAlpha = 0.06;
      for (let y = 0; y < height; y += 7) {
        ctx.fillStyle = `rgba(110, 100, 84, ${0.08 + Math.random() * 0.08})`;
        ctx.fillRect(0, y, width, 1);
      }

      ctx.globalAlpha = 0.03;
      for (let i = 0; i < 9000; i += 1) {
        const x = Math.random() * width;
        const y = Math.random() * height;
        const w = 2 + Math.random() * 10;
        const h = 1 + Math.random() * 3;
        ctx.fillStyle = Math.random() > 0.5 ? '#7b7265' : '#ffffff';
        ctx.fillRect(x, y, w, h);
      }

      const edgeShade = ctx.createLinearGradient(0, 0, width, 0);
      edgeShade.addColorStop(0, 'rgba(120, 110, 95, 0.14)');
      edgeShade.addColorStop(0.05, 'rgba(120, 110, 95, 0.02)');
      edgeShade.addColorStop(0.95, 'rgba(120, 110, 95, 0.02)');
      edgeShade.addColorStop(1, 'rgba(120, 110, 95, 0.14)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = edgeShade;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = '#47423b';
      ctx.textAlign = 'center';
      ctx.font = '700 82px "Courier New", monospace';
      ctx.fillText('GEOMETRY GROCERY', width / 2, 162);
      ctx.font = '600 38px "Courier New", monospace';
      ctx.fillText('Everything fresh in world space', width / 2, 218);

      drawWireCube(ctx, width * 0.16, 152, 66);
      drawWireCube(ctx, width * 0.84, 152, 66);

      ctx.strokeStyle = 'rgba(71, 66, 59, 0.28)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(112, 264);
      ctx.lineTo(width - 112, 264);
      ctx.stroke();

      ctx.fillStyle = '#5c554b';
      ctx.font = '600 36px "Courier New", monospace';
      ctx.textAlign = 'left';
      ctx.fillText('Terminal: PBR-07', 124, 334);
      ctx.fillText('Cashier: Vertex Shader', 124, 382);
      ctx.fillText('Date: 2026-03-13 10:42', 124, 430);

      drawPerforation(ctx, 78, 486, width - 156);

      const items = [
        ['1x', 'Fresnel Bagels', '5.20'],
        ['2x', 'Normal Map Noodles', '7.40'],
        ['1x', 'Quaternion Quiche', '9.80'],
        ['4x', 'Deferred Donuts', '6.00'],
        ['1x', 'Ambient Occlusion Oats', '3.90'],
        ['3x', 'Raymarch Ravioli', '12.60'],
        ['1x', 'Mipmap Muffins', '4.50'],
        ['2x', 'UV Unwrapper Gum', '3.98'],
        ['1x', 'Barycentric Bacon', '8.75'],
        ['1x', 'Bloom Booster Juice', '4.80'],
        ['1x', 'Tonemapped Tofu', '6.30'],
        ['2x', 'Specular Sparkling Water', '5.00']
      ];

      let y = 610;
      ctx.font = '700 34px "Courier New", monospace';
      ctx.fillStyle = '#47423b';
      ctx.fillText('QTY', 124, y);
      ctx.fillText('ITEM', 270, y);
      ctx.textAlign = 'right';
      ctx.fillText('USD', width - 124, y);

      y += 36;
      ctx.strokeStyle = 'rgba(71, 66, 59, 0.26)';
      ctx.beginPath();
      ctx.moveTo(124, y);
      ctx.lineTo(width - 124, y);
      ctx.stroke();

      y += 62;
      ctx.textAlign = 'left';
      ctx.font = '600 40px "Courier New", monospace';

      for (let i = 0; i < items.length; i += 1) {
        const [qty, label, price] = items[i];
        ctx.fillStyle = i % 2 === 0 ? '#4b463f' : '#5a5349';
        ctx.fillText(qty, 124, y);
        ctx.fillText(label, 270, y);
        ctx.textAlign = 'right';
        ctx.fillText(price, width - 124, y);
        ctx.textAlign = 'left';
        y += 96;
      }

      ctx.strokeStyle = 'rgba(71, 66, 59, 0.26)';
      ctx.beginPath();
      ctx.moveTo(124, y - 34);
      ctx.lineTo(width - 124, y - 34);
      ctx.stroke();

      ctx.font = '700 42px "Courier New", monospace';
      ctx.fillStyle = '#47423b';
      ctx.fillText('Subtotal', 124, y + 34);
      ctx.textAlign = 'right';
      ctx.fillText('82.23', width - 124, y + 34);
      ctx.textAlign = 'left';
      ctx.fillText('Coupon: FIX_YOUR_PIVOT', 124, y + 110);
      ctx.textAlign = 'right';
      ctx.fillText('-12.00', width - 124, y + 110);
      ctx.textAlign = 'left';
      ctx.fillText('Tax', 124, y + 186);
      ctx.textAlign = 'right';
      ctx.fillText('5.12', width - 124, y + 186);

      ctx.strokeStyle = 'rgba(71, 66, 59, 0.34)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(124, y + 238);
      ctx.lineTo(width - 124, y + 238);
      ctx.stroke();

      ctx.textAlign = 'left';
      ctx.font = '700 58px "Courier New", monospace';
      ctx.fillText('TOTAL', 124, y + 326);
      ctx.textAlign = 'right';
      ctx.fillText('75.35', width - 124, y + 326);

      ctx.textAlign = 'center';
      ctx.font = '600 36px "Courier New", monospace';
      ctx.fillStyle = '#5b5449';
      ctx.fillText('Reminder: do not non-uniform scale the croissant.', width / 2, y + 454);
      ctx.fillText('Please keep all noodles inside the frustum.', width / 2, y + 508);

      drawMiniBarcode(ctx, width * 0.5 - 250, y + 590, 500, 142);
      drawPixelCode(ctx, width - 336, y + 560, 178);

      ctx.font = '600 34px "Courier New", monospace';
      ctx.fillText('Returns accepted within 14 frames.', width / 2, y + 790);
      ctx.fillText('Thank you for shopping in linear color space.', width / 2, y + 840);

      drawPerforation(ctx, 78, height - 150, width - 156);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
      return texture;
    }

    function drawPerforation(ctx, x, y, width) {
      ctx.fillStyle = 'rgba(80, 72, 62, 0.16)';
      for (let i = 0; i < width; i += 30) {
        ctx.beginPath();
        ctx.arc(x + i, y, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawWireCube(ctx, centerX, centerY, size) {
      const s = size;
      ctx.strokeStyle = 'rgba(71, 66, 59, 0.48)';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.rect(centerX - s * 0.42, centerY - s * 0.28, s * 0.7, s * 0.7);
      ctx.moveTo(centerX - s * 0.1, centerY - s * 0.54);
      ctx.lineTo(centerX + s * 0.6, centerY - s * 0.54);
      ctx.lineTo(centerX + s * 0.6, centerY + s * 0.16);
      ctx.lineTo(centerX - s * 0.1, centerY + s * 0.16);
      ctx.closePath();
      ctx.moveTo(centerX - s * 0.42, centerY - s * 0.28);
      ctx.lineTo(centerX - s * 0.1, centerY - s * 0.54);
      ctx.moveTo(centerX + s * 0.28, centerY - s * 0.28);
      ctx.lineTo(centerX + s * 0.6, centerY - s * 0.54);
      ctx.moveTo(centerX + s * 0.28, centerY + s * 0.42);
      ctx.lineTo(centerX + s * 0.6, centerY + s * 0.16);
      ctx.stroke();
    }

    function drawMiniBarcode(ctx, x, y, width, height) {
      const bars = [
        2, 4, 1, 1, 3, 1, 2, 5, 2, 1, 4, 1, 1, 3, 2, 2, 4, 1, 3, 1, 1, 5, 2, 2, 1, 4, 1, 2, 5, 1, 3, 1, 2, 4
      ];
      const scale = width / bars.reduce((sum, value) => sum + value, 0);
      let cursor = x;
      ctx.fillStyle = '#403b35';
      for (let i = 0; i < bars.length; i += 1) {
        const barWidth = bars[i] * scale;
        if (i % 2 === 0) {
          ctx.fillRect(cursor, y, barWidth, height);
        }
        cursor += barWidth;
      }
    }

    function drawPixelCode(ctx, x, y, size) {
      const cells = 17;
      const step = size / cells;
      for (let row = 0; row < cells; row += 1) {
        for (let col = 0; col < cells; col += 1) {
          const inFinder =
            (row < 5 && col < 5) ||
            (row < 5 && col > cells - 6) ||
            (row > cells - 6 && col < 5);
          let on = false;
          if (inFinder) {
            const edge = row % (cells - 1) < 5 && col % (cells - 1) < 5;
            const rx = col % (cells - 1);
            const ry = row % (cells - 1);
            on = rx === 0 || ry === 0 || rx === 4 || ry === 4 || (rx >= 1 && rx <= 3 && ry >= 1 && ry <= 3);
          } else {
            on = (row * 7 + col * 11 + row * col) % 5 < 2;
          }
          if (on) {
            ctx.fillStyle = '#403b35';
            ctx.fillRect(x + col * step, y + row * step, step, step);
          }
        }
      }
    }
  </script>
